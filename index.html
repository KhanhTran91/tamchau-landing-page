<!DOCTYPE html>
<html lang="en"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tam Chau - Welcome</title>
    <link rel="shortcut icon" type="image/png" href="images/favicon.png">
    <style>
        :root {
            --primary-green: #03592e;
            --dark-green: #27ae60;
            --text-dark: #2c3e50;
            --text-light: #ecf0f1;
            --card-bg: rgba(255, 255, 255, 0.55);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('images/bg.jpg'); 
            background-size: cover;
            background-position: center;
            filter: blur(8px);
            -webkit-filter: blur(8px);
            transform: scale(1.1);
            z-index: -1;
        }

        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            z-index: -1;
        }

        .card {
            background-color: var(--card-bg);
            width: 85%;
            max-width: 380px;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            max-width: 140px;
            height: auto;
            margin-bottom: 1.5rem;
        }

        .welcome-text {
            font-size: 1.3rem;
            color: var(--text-dark);
            margin-bottom: 2rem;
            line-height: 1.4;
            font-weight: 600;
            min-height: 3.6em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .btn {
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: block;
            border: none;
            cursor: pointer;

            background-color: transparent;
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
        }

        .btn:hover {
            background-color: var(--primary-green);
            color: var(--text-light);
        }

        .lang-switcher {
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .lang-btn {
            border: 1px solid rgba(0,0,0,0.1);
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            color: #7f8c8d;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background-color: var(--text-dark);
            color: white;
            border-color: var(--text-dark);
        }

    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <div class="card">
        <img src="images/logo-new.png" alt="Tam Chau Logo" class="logo">
        
        <p class="welcome-text" id="welcome-text">
            Elevate your day with the pure essence of Bao Loc tea.
        </p>

        <div class="nav-buttons">
            <a href="https://tamchau.com/cua-hang/" class="btn btn-primary" id="btn-shop">Shop Now</a>
            <a href="https://tamchau.com/dich-vu/" class="btn btn-secondary" id="btn-home">Our Services</a>
            <a href="https://tamchau.com/lien-he/" class="btn btn-secondary" id="btn-about">Contact Us</a>
        </div>

        <div class="lang-switcher">
            <button class="lang-btn" onclick="changeLang('vi')" id="lang-vi">VN</button>
            <button class="lang-btn active" onclick="changeLang('en')" id="lang-en">EN</button>
            <button class="lang-btn" onclick="changeLang('zh')" id="lang-zh">中文</button>
        </div>
    </div>

<script>
    const content = {
        en: {
            welcome: "Elevate your day with the pure essence of Bao Loc tea.",
            shop: "Shop Now",
            services: "Our Services",
            contact: "Contact Us",
            title: "Tam Chau - Welcome"
        },
        vi: {
            welcome: "Nâng tầm ngày mới với tinh túy thuần khiết của trà Bảo Lộc.",
            shop: "Mua hàng",
            services: "Dịch vụ",
            contact: "Liên hệ",
            title: "Tâm Châu - Chào mừng"
        },
        zh: {
            welcome: "用保禄茶的纯净精华，升华您的一天。",
            shop: "立即购买",
            services: "我们的服务",
            contact: "联系我们",
            title: "Tâm Châu - 欢迎"
        }
    };

    function changeLang(lang) {
        document.getElementById('welcome-text').innerText = content[lang].welcome;
        document.getElementById('btn-shop').innerText = content[lang].shop;
        document.getElementById('btn-home').innerText = content[lang].home;
        document.getElementById('btn-about').innerText = content[lang].about;
        
        document.title = content[lang].title;
        document.documentElement.lang = lang;

        const buttons = document.querySelectorAll('.lang-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        document.getElementById(`lang-${lang}`).classList.add('active');

        localStorage.setItem('preferredLang', lang);
    }

    const savedLang = localStorage.getItem('preferredLang') || 'en';
    if (savedLang !== 'en') {
        changeLang(savedLang);
    }
</script>

</body>
</html>
