<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        :root {
            --primary-color: #3498db;
            --text-color: #333;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        .logo {
            max-width: 120px;
            margin-bottom: 20px;
        }

        h2 { margin-bottom: 30px; font-weight: 500; }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            padding: 12px 20px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 8px;
            transition: transform 0.2s, background 0.2s;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .lang-switcher {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .lang-btn {
            border: none;
            background: none;
            cursor: pointer;
            color: var(--primary-color);
            margin: 0 5px;
            font-size: 0.9rem;
        }

        .lang-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://tamchau.com/wp-content/uploads/2022/10/logo-new.png" alt="Tamchau Logo" class="logo">
    
    <h2 id="thanks-msg">Cảm ơn bạn đã ghé thăm!</h2>

    <div class="nav-buttons">
        <a href="/home" class="btn" id="btn-home">Trang chủ</a>
        <a href="/products" class="btn" id="btn-product">Sản phẩm</a>
        <a href="/about" class="btn" id="btn-about">Giới thiệu</a>
    </div>

    <div class="lang-switcher">
        <button class="lang-btn" onclick="changeLang('vi')">Tiếng Việt</button> |
        <button class="lang-btn" onclick="changeLang('en')">English</button> |
        <button class="lang-btn" onclick="changeLang('zh')">中文</button>
    </div>
</div>

<script>
    const content = {
        vi: {
            thanks: "Cảm ơn bạn đã ghé thăm!",
            home: "Trang chủ",
            product: "Sản phẩm",
            about: "Giới thiệu"
        },
        en: {
            thanks: "Thank you for visiting!",
            home: "Home",
            product: "Products",
            about: "About Us"
        },
        zh: {
            thanks: "感谢您的光临！",
            home: "首页",
            product: "产品",
            about: "关于我们"
        }
    };

    function changeLang(lang) {
        document.getElementById('thanks-msg').innerText = content[lang].thanks;
        document.getElementById('btn-home').innerText = content[lang].home;
        document.getElementById('btn-product').innerText = content[lang].product;
        document.getElementById('btn-about').innerText = content[lang].about;
        
        // Cập nhật thuộc tính lang của thẻ html để tốt cho SEO
        document.documentElement.lang = lang;
    }
</script>

</body>
</html>
